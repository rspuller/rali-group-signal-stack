<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rali Group Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Theme variables ──────────────────────────────────────────────── */
:root {
  /* ── Brand foundation ──────────────────────────────────── */
  --brand-primary: #0C2340;
  --brand-accent:  #C87D3A;
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  /* ── Surfaces ──────────────────────────────────────────── */
  --bg:             #F5F0E8;   /* cream — brand page background */
  --text:           #0C2340;   /* deep navy */
  --text-secondary: #374151;
  --text-muted:     #6B7280;
  --text-faint:     #9CA3AF;
  --text-faintest:  #D1D5DB;
  --card-bg:        #FFFFFF;
  --card-shadow:    0 1px 2px 0 rgb(0 0 0 / 0.05);
  --border:         #DCD3C4;   /* cream-tinted hairline */
  --border-strong:  #C8BFB4;
  --border-divider: #DCD3C4;
  --border-dashed:  #DCD3C4;
  --hover-bg:       #F5F0E8;
  --pill-bg:        #EBE5DA;
  --chip-text:      #0C2340;
  --term-bg:        #EFE9DD;
  --term-conv-bg:   #DCFCE7;
  --term-neg-bg:    #FEE2E2;
  --exec-kpi-bg:    #EBE5DA;
  --canvas-bg:      #F5F0E8;
  --header-bg:      #0C2340;   /* brand navy — perfect for header */
  --header-text:    #FFFFFF;
  --header-meta:    rgba(255,255,255,.55);
  --modal-overlay:  rgba(12,35,64,.45);
  --modal-bg:       #FFFFFF;
  --dropdown-bg:    #FFFFFF;
  --dropdown-border:#DCD3C4;
  --dropdown-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --nvr-new-bg:     #DBEAFE;
  --nvr-new-text:   #1E40AF;
  --nvr-ret-bg:     #FEF3C7;
  --nvr-ret-text:   #92400E;
  --warn-bg:        #FEF3C7;
  --warn-border:    #D97706;
  --warn-text:      #92400E;
  --campaign-total: #0C2340;
  --toggle-bg:      #DCD3C4;
  --toggle-knob:    #FFFFFF;

  /* ── Semantic status tokens ────────────────────────────── */
  --clr-high:          #DC2626;
  --clr-high-bg:       #FEE2E2;
  --clr-high-text:     #991B1B;
  --clr-medium:        #D97706;
  --clr-medium-bg:     #FEF3C7;
  --clr-medium-text:   #92400E;
  --clr-low:           #2563EB;
  --clr-low-bg:        #DBEAFE;
  --clr-low-text:      #1E40AF;
  --clr-success:       #16A34A;
  --clr-success-text:  #16A34A;
  --clr-success-bg:    #DCFCE7;
  --clr-success-strong:#166534;

  /* ── Chart / entity sequence ───────────────────────────── */
  --chart-1: #0C2340;   /* Navy      — Events at 506      */
  --chart-2: #C87D3A;   /* Gold      — Nerra Catering     */
  --chart-3: #2A8C8C;   /* Teal      — Private Office     */
  --chart-4: #E0A82E;   /* Mustard   — Oak & Glow         */
  --chart-5: #D97A4A;   /* Terracotta— Smashing Boxes     */

  /* ── Radii ─────────────────────────────────────────────── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  /* ── Shadows ───────────────────────────────────────────── */
  --shadow-card:      0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-elevated:  0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-modal:     0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}
[data-theme="dark"] {
  --bg:             #0F1A2A;
  --text:           #E8EDF5;
  --text-secondary: #B8C4D4;
  --text-muted:     #8A9BB0;
  --text-faint:     #6B7A8F;
  --text-faintest:  #4A5568;
  --card-bg:        #162032;
  --card-shadow:    0 1px 4px rgb(0 0 0 / 0.4);
  --border:         #1E3050;
  --border-strong:  #243660;
  --border-divider: #1E3050;
  --border-dashed:  #1E3050;
  --hover-bg:       #1A2A40;
  --pill-bg:        #1E3050;
  --chip-text:      #B8C4D4;
  --term-bg:        #162032;
  --term-conv-bg:   #0D2B1A;
  --term-neg-bg:    #2A1215;
  --exec-kpi-bg:    #1A2A40;
  --canvas-bg:      #0F1A2A;
  --header-bg:      #060F1C;
  --header-text:    #E8EDF5;
  --header-meta:    rgba(232,237,245,.45);
  --modal-overlay:  rgba(0,0,0,.7);
  --modal-bg:       #162032;
  --dropdown-bg:    #162032;
  --dropdown-border:#1E3050;
  --dropdown-shadow:0 4px 6px -1px rgb(0 0 0 / 0.4);
  --nvr-new-bg:     #1E3A5F;
  --nvr-new-text:   #93C5FD;
  --nvr-ret-bg:     #422006;
  --nvr-ret-text:   #FCD34D;
  --warn-bg:        #2D1F00;
  --warn-border:    #92400E;
  --warn-text:      #FCD34D;
  --campaign-total: #B8C4D4;
  --toggle-bg:      #1E3050;
  --toggle-knob:    #E8EDF5;
  /* ── Semantic status tokens (dark) ─────────────────────── */
  --clr-high-bg:       #2A1215;
  --clr-high-text:     #FCA5A5;
  --clr-medium-bg:     #2D1F00;
  --clr-medium-text:   #FCD34D;
  --clr-low-bg:        #1E3560;
  --clr-low-text:      #93C5FD;
  --clr-success:       #4ADE80;
  --clr-success-text:  #4ADE80;
  --clr-success-bg:    #052E16;
  --clr-success-strong:#4ADE80;
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 0.875rem;
  line-height: 1.5;
  transition: background .3s, color .3s;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Site header ──────────────────────────────────────────────────── */
.site-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 1.5rem 2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .75rem 1rem;
}
.site-header h1 {
  font-size: 1.375rem;
  font-weight: 700;
  letter-spacing: -.02em;
  flex: 1;
  min-width: 160px;
}
/* Controls group: selects row + date text stacked */
.header-controls {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .3rem;
}
.header-selects {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
/* Date / generated text beneath the selects */
.header-meta {
  font-size: .8125rem;
  color: var(--header-meta);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .15rem;
}
/* Theme toggle + PDF export grouped together */
.header-actions {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

/* ── Preset picker ───────────────────────────────────────────────── */
.preset-picker {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px;
  padding: .4rem .8rem;
  font-family: inherit;
  font-size: .8125rem;
  cursor: pointer;
  outline: none;
}
.preset-picker:hover {
  background: rgba(255,255,255,.18);
}
.preset-picker option {
  background: #1e1d1b;
  color: #fff;
}
.preset-picker.hidden { display: none; }
.custom-range-panel {
  display: flex;
  align-items: center;
  gap: .4rem;
  margin-top: .25rem;
}
.custom-range-panel.hidden { display: none; }
.custom-date-input {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 5px;
  padding: .3rem .5rem;
  font-family: inherit;
  font-size: .75rem;
  outline: none;
  cursor: pointer;
  min-width: 90px;
  text-align: center;
}
.custom-date-input:hover { border-color: rgba(255,255,255,.4); }
.custom-range-sep { color: rgba(255,255,255,.6); font-size: .75rem; }
.cal-wrap { position: relative; display: inline-block; }
.cal-popup {
  display: none; position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
  background: #1e1e1e; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: .5rem; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  min-width: 220px; font-size: .75rem; color: #fff; user-select: none;
}
.cal-popup.open { display: block; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
.cal-nav button {
  background: none; border: none; color: #fff; cursor: pointer; font-size: .85rem;
  padding: .15rem .4rem; border-radius: 4px;
}
.cal-nav button:hover { background: rgba(255,255,255,.15); }
.cal-nav button:disabled { opacity: .25; cursor: default; }
.cal-nav button:disabled:hover { background: none; }
.cal-nav span { font-weight: 600; font-size: .8rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
.cal-grid .cal-hdr { font-size: .65rem; color: rgba(255,255,255,.45); padding: .15rem 0; }
.cal-grid .cal-day {
  padding: .25rem 0; border-radius: 4px; cursor: pointer; font-size: .75rem;
}
.cal-grid .cal-day:hover { background: rgba(255,255,255,.15); }
.cal-grid .cal-day.disabled { color: rgba(255,255,255,.2); cursor: default; }
.cal-grid .cal-day.disabled:hover { background: none; }
.cal-grid .cal-day.selected { background: rgba(255,255,255,.25); font-weight: 700; }
.cal-grid .cal-day.other-month { color: rgba(255,255,255,.15); }
.custom-apply-btn {
  background: rgba(255,255,255,.18);
  color: #fff;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 5px;
  padding: .3rem .7rem;
  font-family: inherit;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
}
.custom-apply-btn:hover { background: rgba(255,255,255,.28); }

/* ── Theme toggle ────────────────────────────────────────────────── */
.theme-toggle {
  display: flex; align-items: center; gap: .5rem;
  cursor: pointer; user-select: none;
  font-size: .75rem; color: var(--header-meta);
}
.theme-toggle-track {
  width: 36px; height: 20px;
  background: var(--toggle-bg);
  border-radius: 20px;
  position: relative;
  transition: background .3s;
}
.theme-toggle-knob {
  width: 16px; height: 16px;
  background: var(--toggle-knob);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform .3s;
}
[data-theme="dark"] .theme-toggle-knob { transform: translateX(16px); }
.theme-toggle-icon { font-size: .9rem; line-height: 1; }

/* ── Container ────────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

/* ── Accordion ────────────────────────────────────────────────────── */
.accordion { border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--border); margin-bottom: 1rem; background: var(--card-bg); }
.accordion.open { overflow: visible; }

.acc-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .9rem 1.25rem;
  cursor: pointer;
  user-select: none;
  background: var(--card-bg);
  border: none;
  width: 100%;
  text-align: left;
  transition: background .15s;
  border-left: 4px solid transparent;
  color: var(--text);
}
.acc-header:hover { background: var(--hover-bg); }
.accordion.open .acc-header { border-left-color: var(--accent); }

.swatch {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--accent);
}
.acc-name { font-weight: 600; font-size: 1.125rem; flex: 1; letter-spacing: -.01em; }

.pills { display: flex; gap: .35rem; flex-wrap: wrap; }
.pill {
  font-size: 0.75rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
  padding: .125rem .5rem; border-radius: var(--radius-sm);
  background: var(--pill-bg); color: var(--text-muted);
  border: 1px solid var(--border);
}

.chips { display: flex; gap: .5rem; flex-wrap: wrap; }
.chip {
  font-size: .75rem; font-weight: 500;
  padding: .2rem .6rem; border-radius: 6px;
  background: var(--metric-bg); color: var(--chip-text);
}

.spend-badge {
  font-weight: 700; font-size: .9375rem;
  white-space: nowrap;
}

.chevron {
  width: 18px; height: 18px; flex-shrink: 0;
  color: var(--text-faintest);
  transition: transform .25s;
}
.accordion.open .chevron { transform: rotate(180deg); }

/* ── Accordion body ───────────────────────────────────────────────── */
.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.acc-body-inner {
  padding: 1.25rem 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}

/* ── Warning box ──────────────────────────────────────────────────── */
.warning-box {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: 8px;
  padding: .65rem 1rem;
  font-size: .8125rem;
  color: var(--warn-text);
  margin-bottom: 1rem;
}

/* ── At-a-glance metric cards ─────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.metric-card {
  background: var(--metric-bg);
  border-radius: var(--radius-md);
  padding: .875rem 1rem;
  border: 1px solid var(--border);
}
.metric-label { font-size: .6875rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: .3rem; }
.metric-value { font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1.1; }
.metric-sub   { font-size: .75rem; color: var(--text-muted); margin-top: .2rem; }
.metric-wow   { font-size: .6875rem; font-weight: 600; margin-top: .2rem; }
.metric-wow.up   { color: var(--clr-success-text); }
.metric-wow.down { color: var(--clr-high-text); }
.metric-wow.flat { color: var(--text-muted); }

/* ── Executive Summary ────────────────────────────────────────────── */
.exec-summary {
  background: var(--card-bg);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  padding: 1.5rem 1.75rem 1.25rem;
  margin-bottom: 1.75rem;
}
.exec-summary-title {
  font-size: 1.0625rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .1rem;
}
.exec-summary-subtitle {
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 1rem;
}
.exec-kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.exec-kpi {
  background: var(--exec-kpi-bg);
  border-radius: 8px;
  padding: .75rem 1rem;
}
.exec-kpi .metric-label { color: var(--text-muted); }
.exec-kpi .metric-value { font-size: 1.625rem; }

.exec-scorecard {
  width: 100%;
  border-collapse: collapse;
  font-size: .8125rem;
}
.exec-scorecard thead th {
  font-size: .6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  background: var(--pill-bg);
  text-align: left;
  padding: .4rem .6rem;
  border-bottom: 1px solid var(--border);
}
.exec-scorecard thead th:not(:first-child) { text-align: right; }
.exec-scorecard tbody td {
  padding: .55rem .6rem;
  border-bottom: 1px solid var(--border);
}
.exec-scorecard tbody td:not(:first-child) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.exec-scorecard .entity-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: .4rem;
  vertical-align: middle;
}
.exec-scorecard .entity-name {
  font-weight: 600;
  color: var(--text);
}
.exec-scorecard .wow-cell { font-weight: 600; font-size: .75rem; }
.exec-scorecard .wow-up   { color: var(--clr-success-text); }
.exec-scorecard .wow-down { color: var(--clr-high-text); }
.exec-scorecard .wow-flat { color: var(--text-faintest); }
.exec-scorecard .exec-leads-dd { position: relative; display: inline-block; }
.exec-scorecard .exec-leads-btn {
  background: none; border: 1px solid transparent; border-radius: 6px;
  color: var(--accent, var(--text)); font-weight: 700; font-size: inherit;
  cursor: pointer; padding: 2px 6px; display: inline-flex; align-items: center; gap: 4px;
  transition: border-color .15s;
}
.exec-scorecard .exec-leads-btn:hover { border-color: var(--accent, rgba(255,255,255,.3)); }
.exec-scorecard .exec-leads-btn svg { width: 12px; height: 12px; color: var(--text-faint); flex-shrink: 0; }
.exec-scorecard .exec-leads-list {
  display: none; position: absolute; right: 0; top: 100%; z-index: 999;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  min-width: 320px; max-height: 260px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,.3);
  white-space: nowrap;
}
.exec-scorecard .exec-leads-list.open { display: block; }
.exec-scorecard .exec-leads-item {
  padding: 6px 12px; font-size: .8rem; cursor: pointer;
  border-bottom: 1px solid var(--border); color: var(--text);
}
.exec-scorecard .exec-leads-item:last-child { border-bottom: none; }
.exec-scorecard .exec-leads-item:hover { background: var(--metric-bg); color: var(--accent); }
.exec-scorecard .exec-leads-split {
  display: flex; gap: .75rem; align-items: flex-start;
}
.exec-scorecard .exec-leads-split .exec-leads-dd { display: inline-block; }
.exec-scorecard .exec-leads-split .exec-split-label {
  font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  color: var(--text-faint); margin-bottom: 2px; white-space: nowrap;
}

/* ── Section date range label ─────────────────────────────────────── */
.section-date-range {
  font-size: .8rem;
  font-weight: 400;
  color: var(--text-faint);
  margin-left: .5rem;
}

/* ── Platform sections ────────────────────────────────────────────── */
.platform-section { margin-bottom: 1.25rem; }
.platform-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent);
  margin-bottom: .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.campaign-name {
  font-size: .72rem; font-weight: 600; color: var(--text-secondary);
  padding: .45rem 0 .2rem;
  border-top: 1px dashed var(--border-dashed);
  margin-top: .35rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.campaign-name:first-of-type { border-top: none; margin-top: 0; }
.campaign-total {
  font-style: italic; color: var(--campaign-total);
  border-top: 1px solid var(--border-strong);
  margin-top: .5rem; padding-top: .5rem;
}
.platform-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem;
}
.prow-item { font-size: .8125rem; }
.prow-item strong { display: block; font-weight: 700; }
.prow-item span   { color: var(--text-muted); font-size: .75rem; }

/* ── Search terms ─────────────────────────────────────────────────── */
.search-terms-section { margin-top: .5rem; }
.search-terms-section h4 {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-secondary); margin-bottom: .65rem;
}
.search-terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.term-list { list-style: none; }
.term-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: .35rem .5rem;
  border-radius: 5px;
  font-size: .8rem;
  margin-bottom: .25rem;
  background: var(--term-bg);
}
.term-list li.converted { background: var(--term-conv-bg); }
.term-list li.negative  { background: var(--term-neg-bg); }
.term-name { flex: 1; margin-right: .5rem; word-break: break-word; }
.term-meta { font-size: .7rem; color: var(--text-muted); white-space: nowrap; }
.term-list li.converted .term-name { color: #15803d; }
.term-list li.negative  .term-name { color: #b91c1c; }

/* ── Inline rec signals (top of paid-ads body) ───────────────────── */
.inline-recs {
  margin-top: 1rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.inline-recs-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text-muted); margin-bottom: .45rem;
}
.inline-recs .rec-item { margin-bottom: .4rem; }
.inline-recs .rec-item:last-child { margin-bottom: 0; }
/* rec-detail is intentionally hidden inline; only visible in the full modal */
.inline-recs .rec-detail { display: none; }

/* ── Insights tables (top keywords / top ads) ─────────────────────── */
.insights-section { margin-top: 1rem; }
.insights-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
.insights-table th {
  text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .05em; color: var(--text-muted);
  padding: .25rem .5rem; border-bottom: 1px solid var(--border);
}
.insights-table td {
  padding: .3rem .5rem; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.insights-table tr:last-child td { border-bottom: none; }
.insights-table td:first-child { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ins-metric { text-align: right; }
.ins-badge-ctr { font-size: .72rem; font-weight: 700; color: var(--accent, #6366f1); }

/* ── Summary table ────────────────────────────────────────────────── */
.summary-table { width: 100%; border-collapse: collapse; font-size: .8375rem; }
.summary-table th {
  text-align: left; font-weight: 600; font-size: .75rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); background: var(--pill-bg);
  padding: .5rem .75rem; border-bottom: 1px solid var(--border);
}
.summary-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.summary-table tr.entity-row td:first-child {
  border-left: 3px solid var(--accent);
  padding-left: .625rem;
}
.summary-footnote { font-size: .75rem; color: var(--text-muted); margin-top: .5rem; }

/* ── Empty state ──────────────────────────────────────────────────── */
.empty-state {
  font-size: .875rem; color: var(--text-faint); font-style: italic;
  padding: .5rem 0;
}

/* ── Tripleseat leads section ─────────────────────────────────────── */
.leads-section {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.leads-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .75rem;
}
.leads-split-wrapper {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
}
.leads-split-wrapper > .leads-section {
  flex: 1 1 45%; min-width: 280px; border-top: none; padding-top: 0;
}
.leads-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
}
.leads-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-size: .75rem; font-weight: 700;
  padding: .15rem .55rem; border-radius: 100px;
  min-width: 1.5rem;
}

/* custom dropdown */
.leads-dropdown { position: relative; display: inline-block; }
.leads-dropdown-btn {
  display: flex; align-items: center; gap: .4rem;
  background: var(--card-bg); border: 1px solid var(--border-strong); border-radius: 7px;
  padding: .4rem .75rem; font-size: .8125rem; font-family: inherit;
  cursor: pointer; color: var(--text); white-space: nowrap;
  transition: border-color .15s;
}
.leads-dropdown-btn:hover { border-color: var(--accent); }
.leads-dropdown-btn svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
.leads-dropdown-list { /* funnel section */
  position: absolute; top: 100%; left: 0; margin-top: .25rem;
  background: var(--dropdown-bg); border: 1px solid var(--dropdown-border); border-radius: 8px;
  box-shadow: 0 4px 16px var(--dropdown-shadow);
  min-width: 320px; max-height: 260px; overflow-y: auto;
  z-index: 1000; display: none; white-space: nowrap;
}
.leads-dropdown-list.open { display: block; }
.leads-dropdown-item {
  padding: .5rem .85rem; font-size: .8125rem; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.leads-dropdown-item:last-child { border-bottom: none; }
.leads-dropdown-item:hover { background: var(--metric-bg); color: var(--accent); }

/* lead modal */
.lead-modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 1rem;
}
.lead-modal-box {
  background: var(--modal-bg); border-radius: 12px;
  box-shadow: 0 8px 40px var(--card-shadow);
  padding: 1.75rem 2rem;
  width: 100%; max-width: 440px;
  position: relative;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.lead-modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: #aaa; line-height: 1;
}
.lead-modal-close:hover { color: var(--text); }
.lead-modal-title {
  font-size: 1.0625rem; font-weight: 700; margin-bottom: 1.1rem;
  padding-right: 1.5rem; color: var(--text);
}
.lead-modal-fields { display: grid; grid-template-columns: auto 1fr; gap: .45rem .75rem; align-items: baseline; }
.lead-modal-key {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); white-space: nowrap;
}
.lead-modal-val { font-size: .875rem; color: var(--text); word-break: break-word; }

/* ── SEO section ──────────────────────────────────────────────────── */
.section-divider {
  border: none; border-top: 2px solid var(--border-divider);
  margin: 2rem 0 1.5rem;
}
.section-heading {
  font-size: 1.0625rem; font-weight: 700; letter-spacing: -.01em;
  color: var(--text); margin-bottom: 1rem;
}
.seo-organic-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
  margin: 0 0 .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.seo-conv-row {
  display: flex; align-items: center; gap: 1.5rem;
  padding: .75rem 0;
  border-top: 1px solid var(--border);
  margin-top: .25rem;
}
.seo-conv-item { font-size: .875rem; }
.seo-conv-item strong { font-weight: 700; font-size: 1.05rem; }
.seo-conv-item span   { color: var(--text-muted); font-size: .75rem; display: block; }
.seo-st-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-secondary);
  margin: 1rem 0 .5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

/* ── SEO enhanced sections ───────────────────────────────────────── */
.seo-section-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent, #555);
  margin: 1.25rem 0 .5rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.seo-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.seo-trend-canvas {
  width: 100%; height: 80px; margin: .5rem 0;
  border-radius: 6px; background: var(--canvas-bg);
}
.seo-change-row {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: .5rem;
}
.seo-change-item {
  font-size: .85rem;
}
.seo-change-item .change-val {
  font-weight: 700; font-size: 1rem;
}
.seo-change-item .change-val.up   { color: #15803d; }
.seo-change-item .change-val.down { color: #b91c1c; }
.seo-change-item .change-label {
  color: var(--text-muted); font-size: .7rem; display: block;
}
.seo-lp-table {
  width: 100%; border-collapse: collapse; font-size: .8125rem;
  margin-top: .25rem;
}
.seo-lp-table th {
  text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); padding: .4rem .5rem;
  border-bottom: 2px solid var(--border-strong);
}
.seo-lp-table th:last-child { text-align: right; }
.seo-lp-table td { padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
.seo-lp-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.seo-lp-table tr:last-child td { border-bottom: none; }
.seo-nvr-bar {
  display: flex; height: 24px; border-radius: 4px; overflow: hidden;
  margin: .5rem 0; font-size: .7rem; font-weight: 600;
}
.seo-nvr-bar .new { background: var(--nvr-new-bg); color: var(--nvr-new-text); display: flex; align-items: center; justify-content: center; }
.seo-nvr-bar .ret { background: var(--nvr-ret-bg); color: var(--nvr-ret-text); display: flex; align-items: center; justify-content: center; }
.seo-nvr-legend {
  display: flex; gap: 1.25rem; font-size: .8rem; margin-top: .25rem;
}
.seo-nvr-legend span { font-weight: 600; }
.seo-gsc-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem; margin-top: .25rem;
}
.seo-query-table th:nth-child(2),
.seo-query-table th:nth-child(3) { text-align: right; }
.seo-query-table td:nth-child(2),
.seo-query-table td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
.seo-query-table td:first-child { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.seo-show-more-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-faint); font-size: .75rem; padding: .3rem .8rem;
  cursor: pointer; transition: border-color .15s, color .15s;
}
.seo-show-more-btn:hover { border-color: var(--accent, #888); color: var(--text); }

/* ── Collapsible top-level sections ───────────────────────────────── */
.section-toggle {
  display: flex;
  align-items: center;
  gap: .5rem;
  cursor: pointer;
  user-select: none;
  padding: .25rem 0;
  margin-bottom: 1rem;
}
.section-toggle h2 { margin: 0; font-size: 1rem; font-weight: 700; letter-spacing: -.01em; color: var(--text); }
.section-toggle .section-chevron {
  width: 20px; height: 20px; color: var(--text-faintest);
  transition: transform .25s;
  flex-shrink: 0;
}
.section-toggle.open .section-chevron { transform: rotate(180deg); }
.section-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s ease;
}
.section-content.open {
  max-height: none;
  overflow: visible;
}

/* ── Funnel grid (4 across on desktop, 2 on mobile) ──────────────── */
.funnel-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .site-header { padding: 1.25rem 1rem; }
  .header-selects { flex-direction: column; align-items: flex-end; gap: .3rem; }
  .chips, .pills { display: none; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .funnel-grid { grid-template-columns: repeat(2, 1fr); }
  .exec-kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .exec-kpi-grid .metric-card:nth-child(3) { grid-column: span 2; }
  .exec-kpi-grid .metric-card:nth-child(6) { grid-column: span 2; }
  .exec-summary { padding: 1.25rem 1rem 1rem; }
  .exec-scorecard { font-size: .75rem; }
  .search-terms-grid { grid-template-columns: 1fr; }
  .platform-row { grid-template-columns: repeat(2, 1fr); }
}
/* ── Analyze button (inside paid ads accordion header) ───────────── */
.analyze-btn {
  background: none; border: 1px solid transparent;
  border-radius: 5px; color: var(--accent, #888); cursor: pointer;
  font-size: .68rem; font-family: inherit; font-weight: 700;
  padding: .2rem .55rem; letter-spacing: .03em;
  transition: border-color .15s, background .15s;
  flex-shrink: 0; margin-right: .25rem;
}
.analyze-btn:hover { border-color: var(--accent, #888); background: rgba(128,128,128,.08); }
@media print { .analyze-btn { display: none !important; } }

/* ── Campaign Analysis modal ──────────────────────────────────────── */
.analysis-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay);
  display: flex; align-items: flex-start; justify-content: center;
  z-index: 1001; padding: 2.5rem 1rem 2rem;
  overflow-y: auto;
}
.analysis-box {
  background: var(--modal-bg); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-modal);
  width: 100%; max-width: 760px;
  position: relative;
  font-family: var(--font-sans);
  margin: auto;
}
.analysis-modal-header {
  display: flex; align-items: center; gap: .65rem;
  padding: 1.25rem 1.5rem .9rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--modal-bg);
  z-index: 2; border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.analysis-modal-swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.analysis-modal-title  { font-size: .9375rem; font-weight: 700; color: var(--text); flex: 1; }
.analysis-modal-range  { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
.analysis-modal-close  {
  background: none; border: none; cursor: pointer;
  font-size: 1.05rem; color: var(--text-muted); line-height: 1;
  padding: .25rem; margin-left: .25rem; flex-shrink: 0;
}
.analysis-modal-close:hover { color: var(--text); }
.analysis-body { padding: 1.25rem 1.5rem 1.75rem; }
.analysis-sec-hdr {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-muted);
  margin: 1.5rem 0 .7rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border);
}
.analysis-sec-hdr:first-child { margin-top: 0; padding-top: 0; border-top: none; }
/* Recommendation cards */
.rec-item {
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: .75rem 1rem; margin-bottom: .6rem;
  border-left-width: 3px;
}
.rec-item.high   { border-left-color: var(--clr-high); }
.rec-item.medium { border-left-color: var(--clr-medium); }
.rec-item.low    { border-left-color: var(--clr-low); }
.rec-row { display: flex; align-items: center; gap: .55rem; margin-bottom: .3rem; }
.rec-badge {
  font-size: .6rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; padding: .2rem .5rem; border-radius: var(--radius-sm);
  white-space: nowrap; flex-shrink: 0; line-height: 1.4;
}
.rec-badge.high   { background: var(--clr-high-bg);   color: var(--clr-high-text); }
.rec-badge.medium { background: var(--clr-medium-bg); color: var(--clr-medium-text); }
.rec-badge.low    { background: var(--clr-low-bg);    color: var(--clr-low-text); }
.rec-cat   { font-size: .68rem; color: var(--text-muted); font-weight: 600; }
.rec-title { font-size: .875rem; font-weight: 600; color: var(--text); }
.rec-detail { font-size: .8rem; color: var(--text-secondary); line-height: 1.55; margin-top: .3rem; }
/* Campaign health table */
.analysis-table {
  width: 100%; border-collapse: collapse; font-size: .8rem;
}
.analysis-table th {
  text-align: left; font-size: .67rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); background: var(--pill-bg);
  padding: .35rem .5rem; border-bottom: 1px solid var(--border);
}
.analysis-table td {
  padding: .5rem .5rem; border-bottom: 1px solid var(--border); vertical-align: middle;
}
.analysis-table tr:last-child td { border-bottom: none; }
.analysis-table .num { text-align: right; }
.qs-pill {
  display: inline-block; padding: .15rem .45rem;
  border-radius: 4px; font-size: .75rem; font-weight: 700;
}
.qs-pill.good     { background: var(--clr-success-bg);  color: var(--clr-success-strong); }
.qs-pill.warning  { background: var(--clr-medium-bg);  color: var(--clr-medium-text); }
.qs-pill.critical { background: var(--clr-high-bg);    color: var(--clr-high-text); }
/* Search term waste rows */
.waste-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem 0; border-bottom: 1px solid var(--border); font-size: .8rem;
}
.waste-row:last-child { border-bottom: none; }
.waste-term  { flex: 1; color: var(--text); }
.waste-spend { font-weight: 700; color: var(--text); white-space: nowrap; min-width: 56px; text-align: right; }
.waste-meta  { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
/* Lead quality rows */
.lq-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .45rem 0; border-bottom: 1px solid var(--border); font-size: .8rem;
}
.lq-row:last-child { border-bottom: none; }
.lq-src  { flex: 1; color: var(--text); }
.lq-cnt  { font-weight: 600; color: var(--text); min-width: 32px; text-align: right; }
.lq-pct  { font-size: .72rem; color: var(--text-muted); min-width: 160px; text-align: right; }
.junk-row {
  padding: .45rem 0; border-bottom: 1px solid var(--border); font-size: .79rem;
}
.junk-row:last-child { border-bottom: none; }
.junk-name  { font-weight: 600; color: var(--text); }
.junk-email { color: var(--text-secondary); }
.junk-why   { font-size: .72rem; color: var(--clr-high);        margin-top: .12rem; }
.susp-why   { font-size: .72rem; color: var(--clr-medium-text); margin-top: .12rem; }
.analysis-empty { color: var(--text-muted); font-size: .82rem; font-style: italic; padding: .4rem 0; }
@media print { .analysis-overlay { display: none !important; } }

/* ── Export PDF button ───────────────────────────────────────────── */
.export-pdf-btn {
  background: none; border: 1px solid var(--header-meta); border-radius: 6px;
  color: var(--header-meta); cursor: pointer; font-size: .7rem; padding: .25rem .6rem;
  margin-left: .75rem; transition: opacity .2s;
}
.export-pdf-btn:hover { opacity: .7; }
/* ── Print / PDF styles ──────────────────────────────────────────── */
@media print {
  body { background: #fff !important; color: #1e1d1b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .site-header { background: #1e1d1b !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .export-pdf-btn, .theme-toggle, #preset-picker, #entity-filter, #custom-range-panel, .seo-show-more-btn { display: none !important; }
  .container { max-width: 100%; padding: .5rem; }
  .acc-section { break-inside: avoid; }
  .acc-body { display: block !important; max-height: none !important; opacity: 1 !important; overflow: visible !important; }
  .metric-card, .funnel-box { break-inside: avoid; }
  .exec-summary { break-after: page; }
  .seo-query-table, .seo-lp-table { font-size: .7rem; }
  table.hidden { display: table !important; }
}
</style>
</head>
<body>

<header class="site-header">
  <h1>The Rali Group Dashboard</h1>
  <div class="header-controls">
    <div class="header-selects">
      <select id="preset-picker" class="preset-picker hidden">
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="this_week" selected>This Week</option>
        <option value="last_week">Last Week</option>
        <option value="last_7_days">Last 7 Days</option>
        <option value="this_month">This Month</option>
        <option value="last_month">Last Month</option>
        <option value="custom">Custom Range</option>
      </select>
      <select id="entity-filter" class="preset-picker hidden">
        <option value="all">All Entities</option>
        <!-- populated by JS from REPORT.entity_filter_options or hardcoded fallback -->
      </select>
    </div>
    <div id="custom-range-panel" class="custom-range-panel hidden">
      <div class="cal-wrap">
        <div class="custom-date-input" id="custom-from-display"></div>
        <div class="cal-popup" id="cal-from"></div>
      </div>
      <span class="custom-range-sep">to</span>
      <div class="cal-wrap">
        <div class="custom-date-input" id="custom-to-display"></div>
        <div class="cal-popup" id="cal-to"></div>
      </div>
      <button id="custom-apply" class="custom-apply-btn">Apply</button>
      <input type="hidden" id="custom-from">
      <input type="hidden" id="custom-to">
    </div>
    <div class="header-meta">
      <span id="header-dates"></span>
      <span id="header-generated"></span>
    </div>
  </div>
  <div class="header-actions">
    <label class="theme-toggle" id="theme-toggle">
      <span class="theme-toggle-icon" id="theme-icon">&#9790;</span>
      <div class="theme-toggle-track"><div class="theme-toggle-knob"></div></div>
    </label>
    <button class="export-pdf-btn" onclick="window.print()">Export PDF</button>
  </div>
</header>
<script>
(function() {
  const html = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.setAttribute('data-theme', 'dark');
  }
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }

    customPanel.classList.add('hidden');
    REPORT = _RAW_DATA.presets[e.target.value];
    renderDashboard();
  });

  customApply.addEventListener('click', () => {
    const from = customFrom.value;
    const to = customTo.value;
    if (!from || !to || from > to) {
      alert('Please select a valid date range.');
      return;
    }
    REPORT = buildCustomReport(from, to);
    renderDashboard();
  });
} else {
  REPORT = _RAW_DATA;
}

function applyEntityFilter() {
  const val = _entityFilter.value;
  const isAll = val === 'all';
  const map = isAll ? null : _ENTITY_FILTER_MAP[val];

  // Filter accordions in each section by data-entity-key
  document.querySelectorAll('.accordion').forEach(acc => {
    const key = acc.dataset.entityKey;
    if (!key) { acc.style.display = ''; return; }
    if (isAll) { acc.style.display = ''; return; }

    // Determine which section this accordion is in
    const parent = acc.closest('[id]');
    const pid = parent ? parent.id : '';
    let visible = false;
    if (pid === 'section-funnels' || acc.querySelector('.funnel-grid')) {
      visible = map.funnel.includes(key);
    } else if (pid === 'section-paid' || key === 'summary') {
      visible = key === 'summary' ? false : map.paid.includes(key);
    } else if (pid === 'section-seo') {
      visible = map.seo.includes(key);
    } else {
      visible = map.paid.includes(key) || map.funnel.includes(key) || map.seo.includes(key);
    }
    acc.style.display = visible ? '' : 'none';
  });

  // Filter summary table rows
  document.querySelectorAll('.entity-row').forEach(row => {
    const key = row.dataset.entityKey;
    if (isAll) { row.style.display = ''; return; }
    row.style.display = map.paid.includes(key) ? '' : 'none';
  });

  // Filter exec scorecard rows by data-exec-key
  document.querySelectorAll('.exec-scorecard tbody tr[data-exec-key]').forEach(row => {
    const ek = row.dataset.execKey;
    if (isAll) { row.style.display = ''; return; }
    row.style.display = map.exec.includes(ek) ? '' : 'none';
  });

  // Update KPI cards based on filtered entities
  const kpiCards = document.querySelectorAll('.exec-kpi');
  function _kpiByName(name) { return document.querySelector(`.exec-kpi[data-kpi="${name}"]`); }
  if (kpiCards.length && window._execRowData) {
    const data = window._execRowData;
    const filtered = isAll ? data : data.filter(r => (map.exec.includes(r.key)));

    function _wowPct(c, p) { return p === 0 ? (c === 0 ? 0 : Infinity) : (c - p) / p; }
    function _fmtWow(pct) {
      if (pct === 0) return '<span class="wow-badge flat">— No change</span>';
      const cls = pct > 0 ? 'up' : 'down';
      const arrow = pct > 0 ? '&#9650;' : '&#9660;';
      const label = pct === Infinity ? 'New' : Math.abs(pct * 100).toFixed(0) + '% vs prev';
      return `<span class="wow-badge ${cls}">${arrow} ${label}</span>`;
    }
    function _setKpi(card, value, subtitle, wowPct) {
      if (!card) return;
      const valEl = card.querySelector('.metric-value');
      const subEl = card.querySelector('.metric-sub');
      const wowEl = card.querySelector('.wow-badge');
      if (valEl) valEl.textContent = value;
      if (subtitle && subEl) subEl.textContent = subtitle;
      if (wowEl && wowPct !== undefined) wowEl.outerHTML = _fmtWow(wowPct);
    }

    // New Revenue this Period
    const totalNewRev = filtered.reduce((s, r) => s + r.funnelRev, 0);
    const prevNewRev = filtered.reduce((s, r) => s + r.prevFunnelRev, 0);
    _setKpi(_kpiByName('new_revenue'), fmt.currency(totalNewRev), isAll ? 'From all pipelines' : null, _wowPct(totalNewRev, prevNewRev));

    // MRR — office_cowork (OfficeRND) or Ghost/Stripe subscription entities
    const hasPO = isAll || filtered.some(r => r.key === 'office_cowork');
    const hasGhostMrr = filtered.some(r => r.isGhost);
    const hasMrr = hasPO || hasGhostMrr;
    const mrrVal = hasMrr ? (window._execMrr || 0) : 0;
    const prevMrrVal = hasMrr ? (window._execPrevMrr || 0) : 0;
    const mrrSub = hasPO ? 'Private Office & Coworking' : (hasGhostMrr ? 'Subscription MRR' : 'N/A for this entity');
    _setKpi(_kpiByName('mrr'), fmt.currency(mrrVal), mrrSub, _wowPct(mrrVal, prevMrrVal));

    // Total Revenue This Month
    if (isAll) {
      _setKpi(_kpiByName('total_rev'), fmt.currency(window._execMtdRevenue || 0), window._execMtdLabel, _wowPct(window._execMtdRevenue || 0, window._execPrevMtdRevenue || 0));
    } else {
      const entityRev = filtered.reduce((s, r) => s + r.scoreRev, 0);
      _setKpi(_kpiByName('total_rev'), fmt.currency(entityRev), 'This period', undefined);
    }

    // Total New Leads (exclude Toast guest count)
    const totalLeads = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.nl, 0);
    const prevLeads = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.prevNl, 0);
    _setKpi(_kpiByName('leads'), fmt.int(totalLeads), isAll ? 'Across all entities' : null, _wowPct(totalLeads, prevLeads));

    // Total Ad Spend
    const totalSpend = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.spend, 0);
    _setKpi(_kpiByName('ad_spend'), fmt.currency(totalSpend), 'Google + Meta', _wowPct(totalSpend, window._execPrevTotalSpend || 0));
  }

  // Hide entire sections (and their preceding divider) with no visible content
  ['section-paid', 'section-seo', 'section-funnels'].forEach(sid => {
    const sec = document.getElementById(sid);
    if (!sec) return;
    const divider = sec.previousElementSibling;
    if (isAll) {
      sec.style.display = '';
      if (divider && divider.classList.contains('section-divider')) divider.style.display = '';
      return;
    }
    const hasVisible = [...sec.querySelectorAll('.accordion')].some(a => a.style.display !== 'none');
    sec.style.display = hasVisible ? '' : 'none';
    if (divider && divider.classList.contains('section-divider')) divider.style.display = hasVisible ? '' : 'none';
  });
}
