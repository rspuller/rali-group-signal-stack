const ENTITY_LABELS = {
  events_506: 'Events at 506',
  private_office: 'Private Office',
  catering: 'Nerra Catering',
  oak_and_glow: 'Oak & Glow Med Spa',
  smashing_boxes: 'Smashing Boxes',
  coworking: 'Coworking',
};
const SEO_ENTITY_LABELS = {
  smashing_boxes: 'Smashing Boxes',
  oak_and_glow: 'Oak & Glow Med Spa',
  durham_bottling: 'Durham Bottling Co.',
  nerra_catering: 'Nerra Catering',
  nerra_dining: 'Nerra Dining',
};
const SEO_ORDER = REPORT.seo_order || ['durham_bottling','nerra_catering','nerra_dining','oak_and_glow','smashing_boxes'];

function _formatDateRange(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (fromStr === toStr) return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()}`;
  if (f.getMonth() === t.getMonth() && f.getFullYear() === t.getFullYear())
    return `${months[f.getMonth()]} ${f.getDate()}-${t.getDate()}, ${t.getFullYear()}`;
  return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()} - ${months[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}`;
}

function _inRange(ts, from, to) {
  return ts >= from && ts <= to;
}

function _prevPeriod(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const span = Math.round((t - f) / 86400000) + 1;
  const pTo = new Date(f.getTime() - 86400000);
  const pFrom = new Date(pTo.getTime() - (span - 1) * 86400000);
  const pad = d => d.toISOString().slice(0, 10);
  return [pad(pFrom), pad(pTo)];
}

function buildCustomReport(fromStr, toStr) {
  const C = _RAW_DATA.custom;
  if (!C) return _RAW_DATA.presets[_RAW_DATA.default_preset]; // fallback

  const [prevFrom, prevTo] = _prevPeriod(fromStr, toStr);

  // -- Aggregate daily ad metrics per entity --------------------------------
  const entities = {};
  const ALL_ENTITIES = REPORT.entity_order || ['events_506','catering','private_office','coworking','oak_and_glow','smashing_boxes'];
  ALL_ENTITIES.forEach(ek => {
    const daily = C.daily_ads[ek] || {};
    let spend = 0, clicks = 0, impressions = 0, conversions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) {
        spend += m.spend; clicks += m.clicks;
        impressions += m.impressions; conversions += m.conversions;
      }
    });
    if (spend === 0 && clicks === 0 && impressions === 0 && conversions === 0) return;

    const platforms = [];
    // Determine platforms from data (simplified)
    if (spend > 0) platforms.push('Google');

    const cpl = conversions > 0 ? spend / conversions : null;
    entities[ek] = {
      label: ENTITY_LABELS[ek],
      platforms: platforms,
      total_spend: Math.round(spend * 100) / 100,
      total_clicks: clicks,
      total_conversions: Math.round(conversions * 100) / 100,
      cpl: cpl != null ? Math.round(cpl * 100) / 100 : null,
      google: { spend, clicks, impressions, conversions, ctr: clicks / (impressions || 1), cpc: clicks > 0 ? spend / clicks : 0 },
      meta: null,
      linkedin: null,
      google_campaigns: [],
      meta_campaigns: [],
      linkedin_campaigns: [],
      search_terms: [],
    };
  });

  // -- CRM funnel computation per entity ------------------------------------
  function _computeFunnel(records, fromS, toS) {
    const byEntity = {};
    records.filter(r => _inRange(r.ts, fromS, toS)).forEach(r => {
      const ek = r.entity;
      if (!byEntity[ek]) byEntity[ek] = { leads: [], tours: [], ts: [], ghl: [], hs: [], orn: [], office: [], orn_ms: [] };
      const bucket = r.src === 'tour' ? 'tours' : r.src === 'office' ? 'office' : r.src === 'orn' ? 'orn' : r.src === 'orn_ms' ? 'orn_ms' : r.src;
      if (byEntity[ek][bucket]) byEntity[ek][bucket].push(r);
    });
    return byEntity;
  }

  const crm = _computeFunnel(C.crm_records, fromStr, toStr);
  const prevCrm = _computeFunnel(C.crm_records, prevFrom, prevTo);

  const _EXCLUDED = new Set(['closed', 'lost']);

  // Compute TS revenue by definite_date (dd) from bookings within a date range
  // Uses ALL bookings (no date filter) so revenue is attributed when confirmed, not when lead was created
  const _tsBookings = C.ts_bookings || [];
  function _tsRevenueByDd(fromS, toS) {
    let rev = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      rev += b.rev || 0;
    }
    return rev;
  }
  function _tsFoodRevenueByDd(fromS, toS) {
    let food = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      if (b.food_rev > 0) food += b.food_rev;
    }
    return food;
  }
  function _tsBookedCountByDd(fromS, toS) {
    let count = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (b.status === 'definite') count++;
    }
    return count;
  }
  function _tsFoodBookedCountByDd(fromS, toS) {
    let count = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      if (b.food_rev > 0) count++;
    }
    return count;
  }

  function _tsFunnel(records, revByDd, bookedByDd) {
    const excluded = records.filter(r => _EXCLUDED.has(r.status)).length;
    const nl = records.length - excluded;
    const ps = records.filter(r => ['proposal', 'proposal sent'].includes(r.status)).length;
    // Events booked: count by definite_date (when confirmed), not lead creation date
    const bk = bookedByDd != null ? bookedByDd : records.filter(r => ['booked', 'definite'].includes(r.status)).length;
    const td = records.filter(r => r.status === 'turned down').length;
    // Use definite_date revenue if provided, else fall back to summing record rev
    const rev = revByDd != null ? revByDd : records.filter(r => !_EXCLUDED.has(r.status)).reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev, turned_down: td };
  }

  function _ghlFunnel(records) {
    const nl = records.length;
    const ps = records.filter(r => ['appt. requested','appt. confirmed','appt. completed'].includes(r.stage)).length;
    const bk = records.filter(r => r.stage === 'appt. completed').length;
    const rev = records.filter(r => r.stage === 'appt. completed').reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _hsFunnel(records) {
    const nl = records.length;
    const wonStages = ['closedwon', 'closed won'];
    const propStages = ['proposalsent', 'proposal sent', 'negotiation', ...wonStages];
    const ps = records.filter(r => propStages.includes(r.stage)).length;
    const bk = records.filter(r => wonStages.includes(r.stage)).length;
    const rev = records.filter(r => wonStages.includes(r.stage)).reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _officeFunnel(crmGroup) {
    const ornRecs = crmGroup?.orn || [];
    const offRecs = crmGroup?.office || [];
    const tourRecs = crmGroup?.tours || [];
    const msRecs = crmGroup?.orn_ms || [];
    // Dedup office leads by email against OfficeRND
    const ornEmails = new Set(ornRecs.map(r => r.email).filter(Boolean));
    const uniqueOffice = offRecs.filter(r => !r.email || !ornEmails.has(r.email));
    const nl = ornRecs.length + uniqueOffice.length;
    // Tours: ORN drop-ins + calendar tours, deduped by name
    const ornDropInNames = new Set(ornRecs.filter(r => r.status === 'drop-in').map(r => (r.name || '').toLowerCase()));
    const uniqueTours = tourRecs.filter(t => !(t.name || '').toLowerCase() || !ornDropInNames.has((t.name || '').toLowerCase()));
    const dropInCount = ornRecs.filter(r => r.status === 'drop-in').length;
    const tours = dropInCount + uniqueTours.length;
    const memberships = msRecs.length;
    const mrr = msRecs.reduce((s, r) => s + (r.price || 0), 0);
    return { new_leads: nl, proposals_sent: tours, events_booked: memberships, revenue_collected: mrr };
  }

  // Attach funnels to entities
  function _attachFunnel(ek, funnel, prevFunnel, mktEntity) {
    if (!entities[ek]) {
      entities[ek] = {
        label: ENTITY_LABELS[ek], platforms: [], total_spend: 0, total_clicks: 0,
        total_conversions: 0, cpl: null, google: null, meta: null, linkedin: null,
        google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
      };
    }
    const e = entities[ek];
    const mktImp = e.google?.impressions || 0;
    const mktClk = e.google?.clicks || 0;
    const mktConv = Math.max(funnel.new_leads, e.total_conversions || 0);
    e.funnel = {
      ...funnel,
      marketing: { impressions: mktImp, clicks: mktClk, conversions: mktConv },
    };
    e.funnel_prev = prevFunnel;
  }

  // Bookings data by definite_date (not filtered by lead creation date)
  const totalTsRev = _tsRevenueByDd(fromStr, toStr);
  const totalTsPrevRev = _tsRevenueByDd(prevFrom, prevTo);
  const totalFoodRev = _tsFoodRevenueByDd(fromStr, toStr);
  const totalPrevFoodRev = _tsFoodRevenueByDd(prevFrom, prevTo);
  const totalTsBooked = _tsBookedCountByDd(fromStr, toStr);
  const totalTsPrevBooked = _tsBookedCountByDd(prevFrom, prevTo);
  const foodBooked = _tsFoodBookedCountByDd(fromStr, toStr);
  const prevFoodBooked = _tsFoodBookedCountByDd(prevFrom, prevTo);

  // Events at 506 — revenue & booked count exclude food bookings (moved to catering)
  const evCrm = (crm.events_506?.ts || []);
  const evPrev = (prevCrm.events_506?.ts || []);
  const evRev = totalTsRev - totalFoodRev;
  const evPrevRev = totalTsPrevRev - totalPrevFoodRev;
  _attachFunnel('events_506', _tsFunnel(evCrm, evRev, totalTsBooked - foodBooked), _tsFunnel(evPrev, evPrevRev, totalTsPrevBooked - prevFoodBooked), 'events_506');
  if (entities.events_506) entities.events_506.leads = evCrm;

  // Catering — revenue = food rev, booked = food bookings confirmed in period
  const catCrm = (crm.catering?.ts || []);
  const catPrev = (prevCrm.catering?.ts || []);
  const catRev = totalFoodRev;
  const catPrevRev = totalPrevFoodRev;
  _attachFunnel('catering', _tsFunnel(catCrm, catRev, foodBooked), _tsFunnel(catPrev, catPrevRev, prevFoodBooked), 'catering');
  if (entities.catering) entities.catering.leads = catCrm;

  // Oak & Glow
  const ghlCrm = (crm.oak_and_glow?.ghl || []);
  const ghlPrev = (prevCrm.oak_and_glow?.ghl || []);
  _attachFunnel('oak_and_glow', _ghlFunnel(ghlCrm), _ghlFunnel(ghlPrev), 'oak_and_glow');
  if (entities.oak_and_glow) entities.oak_and_glow.ghl_leads = ghlCrm;

  // Smashing Boxes
  const hsCrm = (crm.smashing_boxes?.hs || []);
  const hsPrev = (prevCrm.smashing_boxes?.hs || []);
  _attachFunnel('smashing_boxes', _hsFunnel(hsCrm), _hsFunnel(hsPrev), 'smashing_boxes');
  if (entities.smashing_boxes) entities.smashing_boxes.hs_leads = hsCrm;

  // Private Office & Coworking
  const poCrm = crm.private_office || {};
  const poPrev = prevCrm.private_office || {};
  const poFunnel = _officeFunnel(poCrm);
  const poPrevFunnel = _officeFunnel(poPrev);

  // Non-MRR revenue breakdown (Booking Fees + One-off Fees) from OfficeRND invoices
  const MEMBERSHIP_FEES_ACCOUNT = '64512ea0aedd42a098d83367';
  const MRR_STATUSES = new Set(['paid', 'overdue']);
  const _ONEOFF = '64512ea0aedd42a267d83368';
  const _BOOKING = '64512ea0aedd42b7d2d83369';
  const _NON_MRR = new Set([_ONEOFF, _BOOKING]);
  function _nonMrrBreakdownForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let booking = 0, oneoff = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === _BOOKING) booking += line.amount || 0;
        else if (line.account === _ONEOFF) oneoff += line.amount || 0;
      });
    });
    return { booking_fees: booking, oneoff_fees: oneoff };
  }
  // Total invoiced revenue (MRR + non-MRR) for Exec Summary Revenue column
  function _totalRevenueForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let t = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === MEMBERSHIP_FEES_ACCOUNT || _NON_MRR.has(line.account))
          t += line.amount || 0;
      });
    });
    return t;
  }
  const toDateObj = new Date(toStr + 'T00:00:00');
  const _bd = _nonMrrBreakdownForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
  poFunnel.booking_fees = _bd.booking_fees;
  poFunnel.oneoff_fees = _bd.oneoff_fees;
  const prevToObj = new Date(prevTo + 'T00:00:00');
  const _pbd = _nonMrrBreakdownForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  poPrevFunnel.booking_fees = _pbd.booking_fees;
  poPrevFunnel.oneoff_fees = _pbd.oneoff_fees;
  // Merge coworking ad metrics with private_office (zero out coworking to avoid double-count)
  if (entities.coworking && entities.private_office) {
    entities.private_office.total_spend += entities.coworking.total_spend;
    entities.private_office.total_clicks += entities.coworking.total_clicks;
    entities.private_office.total_impressions = (entities.private_office.google?.impressions || 0) + (entities.coworking.google?.impressions || 0);
    entities.coworking.total_spend = 0;
    entities.coworking.total_clicks = 0;
    entities.coworking.total_impressions = 0;
  }
  _attachFunnel('private_office', poFunnel, poPrevFunnel, 'private_office');
  // Exec Summary Revenue: total invoiced revenue (all MRR + non-MRR), not just new memberships
  if (entities.private_office) {
    entities.private_office.exec_revenue = _totalRevenueForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
    entities.private_office.exec_revenue_prev = _totalRevenueForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  }
  if (entities.coworking) {
    entities.coworking.funnel = entities.private_office?.funnel;
    entities.coworking.funnel_prev = entities.private_office?.funnel_prev;
    entities.coworking.exec_revenue = entities.private_office?.exec_revenue;
    entities.coworking.exec_revenue_prev = entities.private_office?.exec_revenue_prev;
  }

  // -- Nerra Dining (Toast POS) -----------------------------------------------
  const toastDaily = C.toast_daily || {};
  let toastNet = 0, toastGuests = 0, toastOrders = 0, toastDiscounts = 0;
  let prevToastNet = 0, prevToastGuests = 0, prevToastOrders = 0, prevToastDiscounts = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, fromStr, toStr)) {
      toastNet += td.net_sales; toastGuests += td.guests; toastOrders += td.orders; toastDiscounts += (td.discounts || 0);
    }
    if (_inRange(d, prevFrom, prevTo)) {
      prevToastNet += td.net_sales; prevToastGuests += td.guests; prevToastOrders += td.orders; prevToastDiscounts += (td.discounts || 0);
    }
  });
  const toastAvgGuest = toastGuests > 0 ? Math.round(toastNet / toastGuests * 100) / 100 : 0;
  const toastAvgOrder = toastOrders > 0 ? Math.round(toastNet / toastOrders * 100) / 100 : 0;
  const prevToastAvgGuest = prevToastGuests > 0 ? Math.round(prevToastNet / prevToastGuests * 100) / 100 : 0;
  const prevToastAvgOrder = prevToastOrders > 0 ? Math.round(prevToastNet / prevToastOrders * 100) / 100 : 0;
  entities.nerra_dining = {
    label: 'Nerra Dining',
    platforms: [], total_spend: 0, total_clicks: 0, total_conversions: 0,
    cpl: null, google: null, meta: null, linkedin: null,
    google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
    toast_net_sales: Math.round(toastNet * 100) / 100,
    toast_guests: toastGuests,
    toast_orders: toastOrders,
    toast_discounts: Math.round(toastDiscounts * 100) / 100,
    toast_avg_guest: toastAvgGuest,
    toast_avg_order: toastAvgOrder,
    funnel: {
      new_leads: toastGuests, revenue_collected: Math.round(toastNet * 100) / 100,
      guests: toastGuests, orders: toastOrders, net_sales: Math.round(toastNet * 100) / 100,
      avg_guest: toastAvgGuest, avg_order: toastAvgOrder, discounts: Math.round(toastDiscounts * 100) / 100,
    },
    funnel_prev: {
      new_leads: prevToastGuests, revenue_collected: Math.round(prevToastNet * 100) / 100,
      guests: prevToastGuests, orders: prevToastOrders, net_sales: Math.round(prevToastNet * 100) / 100,
      avg_guest: prevToastAvgGuest, avg_order: prevToastAvgOrder, discounts: Math.round(prevToastDiscounts * 100) / 100,
    },
  };

  // -- D&D ReinKarnated (Ghost + Stripe) ------------------------------------
  if (C.crm_records && C.crm_records.some(r => r.src === 'ghost')) {
    const ghostAll = C.crm_records.filter(r => r.src === 'ghost');
    const ghostCur  = ghostAll.filter(r => _inRange(r.ts, fromStr, toStr));
    const ghostPrev = ghostAll.filter(r => _inRange(r.ts, prevFrom, prevTo));
    const newFree   = ghostCur.filter(r => r.status !== 'paid').length;
    const newPaid   = ghostCur.filter(r => r.status === 'paid').length;
    const prevFree  = ghostPrev.filter(r => r.status !== 'paid').length;
    const prevPaid  = ghostPrev.filter(r => r.status === 'paid').length;
    const totFree   = ghostAll.filter(r => r.ts <= toStr && r.status !== 'paid').length;
    const totPaid   = ghostAll.filter(r => r.ts <= toStr && r.status === 'paid').length;
    const prevTotFree = ghostAll.filter(r => r.ts <= prevTo && r.status !== 'paid').length;
    const prevTotPaid = ghostAll.filter(r => r.ts <= prevTo && r.status === 'paid').length;
    // Stripe revenue in range
    const stripeInv = C.stripe_invoices || [];
    let stripeRev = 0, prevStripeRev = 0;
    stripeInv.forEach(inv => {
      if (_inRange(inv.ts, fromStr, toStr)) stripeRev += inv.amount || 0;
      if (_inRange(inv.ts, prevFrom, prevTo)) prevStripeRev += inv.amount || 0;
    });
    const stripeMrr = C.stripe_mrr || 0;
    entities.dnd_reinkarnated = entities.dnd_reinkarnated || {
      label: 'D&D ReinKarnated', platforms: [], total_spend: 0, total_clicks: 0,
      total_conversions: 0, cpl: null, google: null, meta: null, linkedin: null,
      google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
    };
    // Merge Meta ad spend if present
    const dndAdEnt = C.daily_ads?.dnd_reinkarnated || {};
    let dndSpend = 0, dndClicks = 0, dndImpr = 0, dndConv = 0;
    Object.entries(dndAdEnt).forEach(([d, m]) => {
      if (!_inRange(d, fromStr, toStr)) return;
      dndSpend += m.spend; dndClicks += m.clicks; dndImpr += m.impressions; dndConv += m.conversions;
    });
    entities.dnd_reinkarnated.total_spend = Math.round(dndSpend * 100) / 100;
    entities.dnd_reinkarnated.total_clicks = dndClicks;
    entities.dnd_reinkarnated.total_impressions = dndImpr;
    entities.dnd_reinkarnated.funnel = {
      new_free_members: newFree, new_paid_members: newPaid,
      total_free_members: totFree, total_paid_members: totPaid,
      mrr: stripeMrr, revenue_collected: Math.round(stripeRev * 100) / 100,
      new_leads: newFree,
      marketing: { impressions: dndImpr, clicks: dndClicks, conversions: newFree },
    };
    entities.dnd_reinkarnated.funnel_prev = {
      new_free_members: prevFree, new_paid_members: prevPaid,
      total_free_members: prevTotFree, total_paid_members: prevTotPaid,
      mrr: stripeMrr, revenue_collected: Math.round(prevStripeRev * 100) / 100,
      new_leads: prevFree,
    };
  }

  // -- SEO (simplified for custom ranges) -----------------------------------
  const seo = {};
  Object.entries(C.ga4_map).forEach(([propId, seoEntity]) => {
    const daily = C.daily_ga4[propId] || {};
    let sessions = 0, users = 0, prevSessions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) { sessions += m.sessions; users += m.users; }
      if (_inRange(d, prevFrom, prevTo)) { prevSessions += m.sessions; }
    });
    if (sessions === 0 && users === 0) return;
    const change = prevSessions > 0 ? (sessions - prevSessions) / prevSessions : null;
    seo[seoEntity] = {
      label: SEO_ENTITY_LABELS[seoEntity],
      ga4: {
        organic: { sessions, users, engagement_rate: null, bounce_rate: null, conversions: 0, conversion_rate: null },
        all_traffic: null,
        daily_organic: null,  // No sparkline for custom
        prev_organic: { sessions: prevSessions },
      },
      landing_pages: null,  // Not available for custom ranges
      new_vs_returning: null,
      organic_search: null,
    };
  });

  // -- Compute totals -------------------------------------------------------
  const totalSpend = Object.values(entities).reduce((s, e) => s + (e.total_spend || 0), 0);

  // -- Compute MRR for the selected month from invoiced payments data ---------
  const toDate = new Date(toStr + 'T00:00:00');
  const toYear = toDate.getFullYear();
  const toMonth = toDate.getMonth(); // 0-based
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-01`;
  const lastDay = new Date(toYear, toMonth + 1, 0).getDate();
  const lastOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
  const targetPeriod = `${toYear}-${String(toMonth + 1).padStart(2, '0')}`;
  let mrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== targetPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) mrr += line.amount || 0;
    });
  });

  // -- MTD revenue (1st of month through toStr) ------------------------------
  const mtdFrom = firstOfMonth;
  let mtdRev = 0;
  // Tripleseat MTD: revenue from ALL bookings by definite_date (not limited to wide range leads)
  _tsBookings.forEach(b => {
    const dd = b.dd || '';
    if (dd && _inRange(dd, mtdFrom, toStr) && !_EXCLUDED.has(b.status) && b.rev) mtdRev += b.rev;
  });
  // Other CRM sources: by creation date
  C.crm_records.forEach(r => {
    if (r.src !== 'ts' && _inRange(r.ts, mtdFrom, toStr) && r.rev) mtdRev += r.rev;
  });
  mtdRev += mrr;
  // Add Toast MTD net sales
  let mtdToastNet = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, mtdFrom, toStr)) mtdToastNet += td.net_sales;
  });
  mtdRev += mtdToastNet;

  // -- Previous-period ad spend -----------------------------------------------
  let prevTotalSpend = 0;
  Object.values(C.daily_ads).forEach(days => {
    Object.entries(days).forEach(([d, m]) => {
      if (_inRange(d, prevFrom, prevTo)) prevTotalSpend += m.spend;
    });
  });

  // -- Previous-month MRR & total revenue -------------------------------------
  const pmMonth = toMonth === 0 ? 11 : toMonth - 1;
  const pmYear = toMonth === 0 ? toYear - 1 : toYear;
  const pmFirst = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-01`;
  const pmLastDay = new Date(pmYear, pmMonth + 1, 0).getDate();
  const pmLast = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-${String(pmLastDay).padStart(2, '0')}`;
  const pmPeriod = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}`;
  let prevMrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== pmPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) prevMrr += line.amount || 0;
    });
  });
  let prevMtdRev = 0;
  // Previous-month Tripleseat: revenue from ALL bookings by definite_date
  _tsBookings.forEach(b => {
    const dd = b.dd || '';
    if (dd && _inRange(dd, pmFirst, pmLast) && !_EXCLUDED.has(b.status) && b.rev) prevMtdRev += b.rev;
  });
  // Other CRM sources: by creation date
  C.crm_records.forEach(r => {
    if (r.src !== 'ts' && _inRange(r.ts, pmFirst, pmLast) && r.rev) prevMtdRev += r.rev;
  });
  prevMtdRev += prevMrr;
  // Add previous-month Toast net sales
  let pmToastNet = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, pmFirst, pmLast)) pmToastNet += td.net_sales;
  });
  prevMtdRev += pmToastNet;

  return {
    date_range: _formatDateRange(fromStr, toStr),
    generated_date: _RAW_DATA.generated_date,
    total_spend: Math.round(totalSpend * 100) / 100,
    entities: entities,
    seo: seo,
    mtd_revenue: Math.round(mtdRev * 100) / 100,
    mtd_month_label: monthNames[toMonth] + ' ' + toYear,
    mrr: Math.round(mrr * 100) / 100,
    prev_total_spend: Math.round(prevTotalSpend * 100) / 100,
    prev_mrr: Math.round(prevMrr * 100) / 100,
    prev_mtd_revenue: Math.round(prevMtdRev * 100) / 100,
    _is_custom: true,
  };
}

// ── Header & renderDashboard ─────────────────────────────────────────────────
function renderDashboard() {
document.getElementById('header-dates').textContent     = REPORT.date_range;
document.getElementById('header-generated').textContent = _IS_PRESET_MODE
  ? 'Generated ' + _RAW_DATA.generated_date
  : 'Generated ' + REPORT.generated_date;

// ── Build UI ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');
app.innerHTML = '';

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (inner) e.innerHTML = inner;
  return e;
}

function metricCard(label, value, sub, wow) {
  const card = el('div', 'metric-card');
  let wowHtml = '';
  if (wow != null) {
    if (wow === 0) {
      wowHtml = '<div class="metric-wow flat">— No change</div>';
    } else if (wow === Infinity || wow === -Infinity) {
      // Previous period was 0
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} New</div>`;
    } else {
      const pct = Math.abs(wow * 100).toFixed(0);
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} ${pct}% vs prev</div>`;
    }
  }
  card.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}${wowHtml}`;
  return card;
}

function pRowItem(label, value) {
  return `<div class="prow-item"><strong>${value}</strong><span>${label}</span></div>`;
}

// ── Summary accordion ────────────────────────────────────────────────────────
function buildSummary() {
  const entities = REPORT.entities;
  const rows = ENTITY_ORDER.map(key => {
    const e   = entities[key];
    const sty = ENTITY_STYLES[key];
    if (!e) return '';
    const cpl = e.cpl != null ? fmt.currency(e.cpl) : '—';
    return `
      <tr class="entity-row" data-entity-key="${key}" style="--accent:${sty.accent};--metric-bg:${getMetricBg(sty)}">
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${sty.accent};margin-right:.4rem;vertical-align:middle;"></span>${e.label}</td>
        <td>${e.platforms.join(', ') || '—'}</td>
        <td class="num">${fmt.currency(e.total_spend)}</td>
        <td class="num">${fmt.int(e.total_clicks)}</td>
        <td class="num">${fmt.dec(e.total_conversions)}</td>
        <td class="num">${cpl}</td>
      </tr>`;
  }).join('');

  const totalSpend = ENTITY_ORDER.reduce((s, k) => s + (entities[k]?.total_spend || 0), 0);

  const acc = buildAccordion('summary', '', 'Weekly Summary', [], [], fmt.currency(totalSpend), false);
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = `
    <table class="summary-table">
      <thead><tr>
        <th>Entity</th><th>Platforms</th>
        <th class="num">Spend</th><th class="num">Clicks</th>
        <th class="num">Conv.</th><th class="num">CPL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  return acc;
}

// ── Entity accordion ─────────────────────────────────────────────────────────
function buildEntityAccordion(key) {
  const e   = REPORT.entities[key];
  const sty = ENTITY_STYLES[key];
  if (!e) return null;

  const chips = [];
  if (e.total_clicks)      chips.push(`${fmt.int(e.total_clicks)} clicks`);
  if (e.total_conversions) chips.push(`${fmt.dec(e.total_conversions)} conv.`);
  if (e.cpl != null)       chips.push(`${fmt.currency(e.cpl)} CPL`);

  const acc = buildAccordion(key, sty.accent, e.label, e.platforms, chips, fmt.currency(e.total_spend));
  acc.style.setProperty('--metric-bg', getMetricBg(sty));
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = buildEntityBody(key, e, sty);

  // Inject "Analyze" button into header if analysis data exists for this entity
  if (_ANALYSIS[key]) {
    const analyzeBtn = document.createElement('button');
    analyzeBtn.className = 'analyze-btn';
    analyzeBtn.textContent = 'Analyze';
    analyzeBtn.title = 'Open campaign analysis';
    analyzeBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      openAnalysisModal(key);
    });
    const hdr = acc.querySelector('.acc-header');
    hdr.insertBefore(analyzeBtn, hdr.querySelector('.chevron'));
  }

  return acc;
}

function buildEntityBody(key, e, sty) {
  let html = '';

  // No data state
  const hasAny = e.google || e.meta || e.linkedin;
  if (!hasAny) {
    return html + `<p class="empty-state">No active campaigns this period.</p>`;
  }

  // At-a-glance metrics — blended across all active platforms
  html += `<div class="metrics-grid">`;

  const blendSpend = e.total_spend;
  const blendClicks = e.total_clicks;
  const blendConv = e.total_conversions;
  const blendImpr = (e.google?.impressions || 0) + (e.meta?.impressions || 0) + (e.linkedin?.impressions || 0);
  const blendCTR = blendImpr ? blendClicks / blendImpr : null;
  const blendCPL = blendConv ? blendSpend / blendConv : null;
  const blendReach = Math.max(e.meta?.reach || 0, e.linkedin?.reach || 0) || null;
  const blendCPM = blendImpr ? (blendSpend * 1000 / blendImpr) : null;

  // Previous-period ad metrics for vs-prev deltas
  const _spendPrev = e.total_spend_prev ?? null;
  const _convPrev  = e.total_conversions_prev ?? null;
  const _cplPrev   = e.cpl_prev ?? null;
  function _adWow(curr, prev) {
    if (prev == null) return null;
    if (prev === 0)   return curr > 0 ? Infinity : null;
    return (curr - prev) / prev;
  }
  const spendWow = _adWow(blendSpend, _spendPrev);
  const convWow  = _adWow(blendConv, _convPrev);
  // CPL: lower is better — invert direction so down = green
  const cplCurr = blendCPL;
  const cplWow  = (_cplPrev != null && _cplPrev > 0 && cplCurr != null)
    ? -((cplCurr - _cplPrev) / _cplPrev)   // invert: cost decrease = positive
    : null;

  html += metricCard('Spend', fmt.currency(blendSpend), e.platforms.join(' + '), spendWow).outerHTML;
  html += metricCard('Clicks', fmt.int(blendClicks), `CTR ${fmt.pct(blendCTR)}`).outerHTML;
  if (key !== 'events_506') {
    html += metricCard('Conversions', fmt.dec(blendConv), `CPL ${fmt.currency(blendCPL)}`, convWow).outerHTML;
  } else {
    html += metricCard('Conversions', fmt.dec(blendConv), null, convWow).outerHTML;
  }
  const blendCPA = blendConv ? blendSpend / blendConv : null;
  const funnelRev = e.funnel?.revenue_collected || 0;
  const blendROAS = (funnelRev && blendSpend) ? (funnelRev / blendSpend) : null;
  html += metricCard('Impressions', fmt.int(blendImpr), null).outerHTML;
  html += metricCard('CPA', fmt.currency(blendCPA), 'Cost per Acquisition', cplWow).outerHTML;
  html += metricCard('CPM', fmt.currency(blendCPM), null).outerHTML;
  html += `</div>`; // /metrics-grid
  // ROAS row hidden until attribution is sorted out
  // if (blendROAS != null) {
  //   html += `<div class="metrics-grid" style="grid-template-columns:repeat(2,1fr);margin-top:-.65rem">`;
  //   html += metricCard('ROAS', blendROAS.toFixed(2) + 'x', fmt.currency(funnelRev) + ' revenue / ' + fmt.currency(blendSpend) + ' spend').outerHTML;
  //   html += metricCard('Revenue', fmt.currency(funnelRev), 'From CRM').outerHTML;
  //   html += `</div>`;
  // }

  // Per-platform detail rows — broken out by campaign
  function gRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('Conversions', fmt.dec(c.conversions))}
      ${pRowItem('CPL', fmt.currency(c.cost_per_conversion))}
      ${pRowItem('Quality Score', c.quality_score != null ? fmt.dec(c.quality_score,1) : '—')}
      ${pRowItem('Impr. Share', c.search_impression_share != null ? fmt.pct(c.search_impression_share) : '—')}
    </div>`;
  }
  function mRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Frequency', c.frequency != null ? fmt.dec(c.frequency,2) : '—')}
      ${pRowItem('Link Clicks', fmt.int(c.link_clicks))}
      ${key !== 'events_506' ? pRowItem('Leads', fmt.int(c.leads)) : ''}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${key !== 'events_506' ? pRowItem('CPL', fmt.currency(c.cost_per_lead)) : ''}
      ${pRowItem('Engagement', fmt.int(c.engagement))}
    </div>`;
  }
  function lRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('Conversions', fmt.int(c.conversions))}
      ${pRowItem('Leads (1-click)', fmt.int(c.leads))}
      ${pRowItem('Form Opens', fmt.int(c.form_opens))}
      ${pRowItem('Eng. Rate', c.engagement_rate != null ? fmt.pct(c.engagement_rate) : '—')}
    </div>`;
  }

  if (e.google && e.google_campaigns && e.google_campaigns.length) {
    const multi = e.google_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Google Ads</div>`;
    for (const c of e.google_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${gRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${gRow(e.google)}`;
    }
    html += `</div>`;
  }

  if (e.meta && e.meta_campaigns && e.meta_campaigns.length) {
    const multi = e.meta_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Meta</div>`;
    for (const c of e.meta_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${mRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${mRow(e.meta)}`;
    }
    html += `</div>`;
  }

  if (e.linkedin && e.linkedin_campaigns && e.linkedin_campaigns.length) {
    const multi = e.linkedin_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">LinkedIn</div>`;
    for (const c of e.linkedin_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${lRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${lRow(e.linkedin)}`;
    }
    html += `</div>`;
  }

  // ── Top 3 Google Keywords ────────────────────────────────────────────────
  const topKws = e.top_keywords || [];
  if (topKws.length > 0) {
    const hasConv = topKws.some(k => k.conversions > 0);
    html += `<div class="insights-section">
      <div class="section-subtitle" style="margin-bottom:.35rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Top Keywords — Google Search</div>
      <table class="insights-table">
        <thead><tr>
          <th>Keyword</th>
          <th class="ins-metric">Clicks</th>
          ${hasConv ? '<th class="ins-metric">Conv.</th>' : ''}
          <th class="ins-metric">Spend</th>
        </tr></thead>
        <tbody>${topKws.map(k => `<tr>
          <td title="${k.keyword}">${k.keyword}</td>
          <td class="ins-metric">${fmt.int(k.clicks)}</td>
          ${hasConv ? `<td class="ins-metric">${k.conversions > 0 ? fmt.dec(k.conversions, 1) : '—'}</td>` : ''}
          <td class="ins-metric">${fmt.currency(k.spend)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // ── Top 3 Meta Ads ───────────────────────────────────────────────────────
  const topAds = e.top_meta_ads || [];
  if (topAds.length > 0) {
    const hasLeads = topAds.some(a => a.leads > 0);
    html += `<div class="insights-section">
      <div class="section-subtitle" style="margin-bottom:.35rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Top Ads — Meta (by CTR)</div>
      <table class="insights-table">
        <thead><tr>
          <th>Ad Name</th>
          <th class="ins-metric">Spend</th>
          <th class="ins-metric">CTR</th>
          ${hasLeads ? '<th class="ins-metric">Leads</th>' : ''}
        </tr></thead>
        <tbody>${topAds.map(a => `<tr>
          <td title="${a.ad_name}">${a.ad_name || '(unnamed)'}</td>
          <td class="ins-metric">${fmt.currency(a.spend)}</td>
          <td class="ins-metric"><span class="ins-badge-ctr">${a.ctr.toFixed(1)}%</span></td>
          ${hasLeads ? `<td class="ins-metric">${a.leads > 0 ? a.leads : '—'}</td>` : ''}
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // ── Inline recommendation signals (last-month analysis, top 3) ────────────
  // These are scoped to the last-month analysis window, not the currently
  // selected preset.  The full detail is in the Campaign Analysis modal.
  const _entityRecs = (_ANALYSIS[key] || {}).recommendations || [];
  if (_entityRecs.length > 0) {
    const topRecs = _entityRecs.slice(0, 3);
    html += `<div class="inline-recs">
      <div class="inline-recs-label">Signals — last month</div>`;
    for (const r of topRecs) {
      const p = r.priority.toLowerCase();
      html += `<div class="rec-item ${p}" data-rec-id="${r.rec_id || ''}">
        <div class="rec-row">
          <span class="rec-badge ${p}">${r.priority}</span>
          <span class="rec-cat">${r.category}</span>
        </div>
        <div class="rec-title">${r.title}</div>
      </div>`;
    }
    html += `</div>`;
  }

  return html;
}

function buildSearchTerms(st, sty) {
  function termLi(t, cls) {
    const conv = t.conversions > 0 ? ' converted' : '';
    return `<li class="${cls}${t.conversions > 0 ? ' converted' : ''}">
      <span class="term-name">${t.term}</span>
      <span class="term-meta">${t.clicks} clk · $${(+t.spend).toFixed(2)}</span>
    </li>`;
  }

  const topHtml = st.top.map(t => termLi(t, '')).join('');
  const negHtml = st.negatives.map(t => termLi(t, 'negative')).join('');

  return `
  <div class="search-terms-section">
    <div class="search-terms-grid">
      <div>
        <h4>Top search terms — suggest as keywords</h4>
        <ul class="term-list">${topHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
      <div>
        <h4>Search terms to review — negative keyword candidates</h4>
        <ul class="term-list">${negHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
    </div>
  </div>`;
}

// ── Generic leads section ────────────────────────────────────────────────────
function _leadItemLabel(l, statusField) {
  const name = l.name || '(unnamed)';
  const stat = statusField ? (l[statusField] || '') : '';
  if (!stat) return name;
  const lower = stat.toLowerCase();
  if (lower === 'booked' || lower === 'active') {
    return `${name} <span style="color:var(--clr-success);font-weight:700">(CLOSED WON)</span>`;
  }
  return `${name} <span style="opacity:.6">(${stat})</span>`;
}

function buildLeadsSection(leads, opts) {
  const label    = (opts && opts.label)    || 'Leads';
  const pfx      = (opts && opts.idPrefix) || 'leads';
  const sFld     = (opts && opts.statusField) || '';
  const count    = leads.length;
  const btnLabel = count === 0 ? 'No leads this period' : 'Select a lead';

  const itemsHtml = count === 0
    ? '<div class="leads-dropdown-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
    : leads.map((l, i) =>
        `<div class="leads-dropdown-item" data-lead-idx="${i}">${_leadItemLabel(l, sFld)}</div>`
      ).join('');

  return `
  <div class="leads-section">
    <div class="leads-header">
      <span class="leads-label">${label}</span>
      <span class="leads-count-badge">${count}</span>
      <div class="leads-dropdown" id="${pfx}-dd">
        <button class="leads-dropdown-btn" id="${pfx}-dd-btn" ${count === 0 ? 'disabled style="opacity:.5;cursor:default"' : ''}>
          ${btnLabel}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="leads-dropdown-list" id="${pfx}-dd-list">${itemsHtml}</div>
      </div>
    </div>
  </div>`;
}

function initLeadsDropdown(leads, idPrefix, openFn) {
  const pfx  = idPrefix || 'leads';
  const btn  = document.getElementById(pfx + '-dd-btn');
  const list = document.getElementById(pfx + '-dd-list');
  if (!btn || !list || leads.length === 0) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    list.classList.toggle('open');
  });

  list.addEventListener('click', e => {
    const item = e.target.closest('[data-lead-idx]');
    if (!item) return;
    list.classList.remove('open');
    openFn(leads[+item.dataset.leadIdx]);
  });
}

// Note: document-click handler for closing dropdowns registered outside renderDashboard

function _showModal(title, fieldPairs) {
  const modal = document.getElementById('lead-modal');
  if (!modal) return;
  modal.querySelector('.lead-modal-title').textContent = title || '(unnamed)';
  modal.querySelector('.lead-modal-fields').innerHTML = fieldPairs.map(([k, v]) =>
    `<span class="lead-modal-key">${k}</span><span class="lead-modal-val">${v || '—'}</span>`
  ).join('');
  modal.style.display = 'flex';
}

// ── Campaign Analysis modal ──────────────────────────────────────────────────
function openAnalysisModal(entityKey) {
  const data = _ANALYSIS[entityKey];
  if (!data) return;
  const modal = document.getElementById('analysis-modal');
  const body  = document.getElementById('analysis-body');
  const sty   = (window.__ENTITY_STYLES || {})[entityKey] || {};
  const accent = sty.accent || '#555';

  document.getElementById('analysis-swatch').style.background = accent;
  document.getElementById('analysis-title').textContent = data.label + ' — Campaign Analysis';
  // Build a friendly "Last Month — Mar 2026" label from the analyzer's date range
  const rangeEl = document.getElementById('analysis-range');
  if (_ANALYSIS_RANGE.from) {
    const d = new Date(_ANALYSIS_RANGE.from + 'T00:00:00');
    const month = d.toLocaleString('en-US', { month: 'short' });
    rangeEl.textContent = 'Last Month — ' + month + ' ' + d.getFullYear();
  } else {
    rangeEl.textContent = '';
  }

  let html = '';

  // ── Recommendations ──────────────────────────────────────────────────────
  const recs = data.recommendations || [];
  html += `<div class="analysis-sec-hdr">Recommendations</div>`;
  if (!recs.length) {
    html += `<div class="analysis-empty">No issues detected for this period.</div>`;
  } else {
    for (const r of recs) {
      const p = r.priority.toLowerCase();
      html += `<div class="rec-item ${p}" data-rec-id="${r.rec_id || ''}" data-rec-type="${r.rec_type || ''}">
        <div class="rec-row">
          <span class="rec-badge ${p}">${r.priority}</span>
          <span class="rec-cat">${r.category}</span>
        </div>
        <div class="rec-title">${r.title}</div>
        <div class="rec-detail">${r.detail}</div>
      </div>`;
    }
  }

  // ── Campaign Health ──────────────────────────────────────────────────────
  const campaigns = data.campaigns || [];
  html += `<div class="analysis-sec-hdr">Campaign Health — Google Ads</div>`;
  if (!campaigns.length) {
    html += `<div class="analysis-empty">No Google Ads campaigns in this period.</div>`;
  } else {
    html += `<table class="analysis-table"><thead><tr>
      <th>Campaign</th>
      <th class="num">Spend</th>
      <th class="num">Clicks</th>
      <th class="num">Conv.</th>
      <th class="num">CPA</th>
      <th class="num">QS</th>
      <th class="num">Imp.&nbsp;Share</th>
    </tr></thead><tbody>`;
    for (const c of campaigns) {
      const qsHtml = c.quality_score != null
        ? `<span class="qs-pill ${c.health}">${c.quality_score}</span>` : '—';
      const sisHtml = c.search_impression_share != null
        ? Math.round(c.search_impression_share * 100) + '%' : '—';
      html += `<tr>
        <td style="max-width:240px;word-break:break-word">${c.name}</td>
        <td class="num">${fmt.currency(c.spend)}</td>
        <td class="num">${fmt.int(c.clicks)}</td>
        <td class="num">${fmt.dec(c.conversions, 1)}</td>
        <td class="num">${c.cpa != null ? fmt.currency(c.cpa) : '—'}</td>
        <td class="num">${qsHtml}</td>
        <td class="num">${sisHtml}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── Campaign Health — Meta ───────────────────────────────────────────────
  const metaCampaigns = data.meta_campaigns || [];
  if (metaCampaigns.length) {
    html += `<div class="analysis-sec-hdr">Campaign Health — Meta (Facebook / Instagram)</div>`;
    html += `<table class="analysis-table"><thead><tr>
      <th>Campaign</th>
      <th class="num">Spend</th>
      <th class="num">Impr.</th>
      <th class="num">CTR</th>
      <th class="num">CPM</th>
      <th class="num">Freq.</th>
      <th class="num">Leads</th>
      <th class="num">CPL</th>
    </tr></thead><tbody>`;
    for (const c of metaCampaigns) {
      const ctrHtml  = c.ctr  != null ? (c.ctr * 100).toFixed(2) + '%' : '—';
      const cpmHtml  = c.cpm  != null ? fmt.currency(c.cpm) : '—';
      const cplHtml  = c.cpl  != null ? fmt.currency(c.cpl) : '—';
      const freqHtml = c.frequency != null
        ? `<span class="qs-pill ${c.health}">${c.frequency}</span>` : '—';
      html += `<tr>
        <td style="max-width:240px;word-break:break-word">${c.name}</td>
        <td class="num">${fmt.currency(c.spend)}</td>
        <td class="num">${fmt.int(c.impressions)}</td>
        <td class="num">${ctrHtml}</td>
        <td class="num">${cpmHtml}</td>
        <td class="num">${freqHtml}</td>
        <td class="num">${fmt.dec(c.leads, 1)}</td>
        <td class="num">${cplHtml}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── Search Term Waste ────────────────────────────────────────────────────
  const terms    = data.terms || {};
  const noClick  = terms.no_click_waste  || [];
  const lowConv  = terms.low_conv_waste  || [];
  const wasteTot = terms.waste_total     || 0;
  const wasteLabel = wasteTot > 0 ? ` — ${fmt.currency(wasteTot)} at risk` : '';
  html += `<div class="analysis-sec-hdr">Search Term Waste${wasteLabel}</div>`;

  if (noClick.length) {
    html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em">Zero-click terms — add as negatives</div>`;
    for (const t of noClick) {
      html += `<div class="waste-row">
        <span class="waste-term">${t.term}</span>
        <span class="waste-spend">${fmt.currency(t.spend)}</span>
        <span class="waste-meta">${fmt.int(t.impressions)} impr · 0 clicks</span>
      </div>`;
    }
  }
  if (lowConv.length) {
    html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:${noClick.length?'.85rem':'0'} 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Clicks but zero conversions — review</div>`;
    for (const t of lowConv) {
      const ctrPct = t.ctr ? Math.round(t.ctr * 100) + '% CTR' : '';
      html += `<div class="waste-row">
        <span class="waste-term">${t.term}</span>
        <span class="waste-spend">${fmt.currency(t.spend)}</span>
        <span class="waste-meta">${fmt.int(t.clicks)} clicks · 0 conv${ctrPct ? ' · ' + ctrPct : ''}</span>
      </div>`;
    }
  }
  if (!noClick.length && !lowConv.length) {
    html += `<div class="analysis-empty">No significant search term waste detected.</div>`;
  }

  // ── Lead Quality ─────────────────────────────────────────────────────────
  const lq = data.lead_quality;
  if (lq && lq.total > 0) {
    html += `<div class="analysis-sec-hdr">Lead Quality — ${fmt.int(lq.total)} leads this period</div>`;

    // Source breakdown
    const srcEntries = Object.entries(lq.by_source)
      .filter(([, d]) => d.total > 0)
      .sort((a, b) => b[1].total - a[1].total);
    for (const [src, d] of srcEntries) {
      const qualStr = d.qualified > 0 ? ` · Qualified: ${Math.round(d.qualified / d.total * 100)}%` : '';
      const wonStr  = d.won > 0      ? ` · Won: ${Math.round(d.won / d.total * 100)}%`       : '';
      html += `<div class="lq-row">
        <span class="lq-src">${src}</span>
        <span class="lq-cnt">${d.total}</span>
        <span class="lq-pct">${qualStr}${wonStr}</span>
      </div>`;
    }

    // Consumer email warning banner
    if (lq.consumer_email_pct != null && lq.consumer_email_pct > 0.3 && lq.paid_total >= 3) {
      html += `<div style="font-size:.78rem;color:#d97706;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:6px;padding:.5rem .75rem;margin:.75rem 0">
        ${Math.round(lq.consumer_email_pct * 100)}% of paid search leads used personal email addresses
        (gmail / yahoo / hotmail) — indicating consumer intent rather than business buyers.
      </div>`;
    }

    // Junk leads
    const junkLeads = lq.junk_leads      || [];
    const suspLeads = lq.suspicious_leads || [];
    if (junkLeads.length) {
      html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:.85rem 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Confirmed junk (${junkLeads.length})</div>`;
      for (const l of junkLeads) {
        html += `<div class="junk-row">
          <span class="junk-name">${l.name}</span>
          <span class="junk-email"> · ${l.email || '(no email)'}</span>
          <span style="color:var(--text-muted)"> · ${l.stage || ''}</span>
          <div class="junk-why">${l.reasons.join('; ')}</div>
        </div>`;
      }
    }
    if (suspLeads.length) {
      html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:.85rem 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Suspicious — review (${suspLeads.length})</div>`;
      for (const l of suspLeads) {
        const lp = l.landing_page ? ` · ${l.landing_page}` : '';
        html += `<div class="junk-row">
          <span class="junk-name">${l.name}</span>
          <span class="junk-email"> · ${l.email || '(no email)'}</span>
          <span style="color:var(--text-muted)"> · ${l.stage || ''}${lp}</span>
          <div class="susp-why">${l.reasons.join('; ')}</div>
        </div>`;
      }
    }
    if (!junkLeads.length && !suspLeads.length) {
      html += `<div class="analysis-empty" style="margin-top:.5rem">No junk or suspicious leads detected.</div>`;
    }
  }

  body.innerHTML = html;
  modal.style.display = 'flex';
  modal.scrollTop = 0;
}

// ── Accordion builder ────────────────────────────────────────────────────────
function buildAccordion(key, accent, name, platforms, chips, spend, startOpen=false) {
  const sty = ENTITY_STYLES[key] || {};
  const acc = el('div', 'accordion' + (startOpen ? ' open' : ''));
  acc.id = 'entity-' + key.replace('_funnel', '');   // stable deep-link anchor
  acc.dataset.entityKey = key.replace('_funnel', '');
  if (accent) acc.style.setProperty('--accent', accent);
  else if (sty.accent) acc.style.setProperty('--accent', sty.accent);
  acc.style.setProperty('--metric-bg', getMetricBg(sty));

  const swatchHtml = accent ? `<div class="swatch"></div>` : '';

  const pillsHtml = platforms.length
    ? `<div class="pills">${platforms.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`
    : '';

  const chipsHtml = chips.length
    ? `<div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`
    : '';

  const hdr = el('button', 'acc-header');
  hdr.setAttribute('aria-expanded', startOpen ? 'true' : 'false');
  hdr.innerHTML = `
    ${swatchHtml}
    <span class="acc-name">${name}</span>
    ${pillsHtml}
    ${chipsHtml}
    <span class="spend-badge">${spend}</span>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const body = el('div', 'acc-body');
  const bodyInner = el('div', 'acc-body-inner');
  body.appendChild(bodyInner);

  acc.appendChild(hdr);
  acc.appendChild(body);

  if (startOpen) {
    requestAnimationFrame(() => {
      body.style.maxHeight = 'none';
      body.style.overflow = 'visible';
    });
  }

  body.addEventListener('transitionend', (ev) => {
    if (ev.propertyName === 'max-height' && acc.classList.contains('open')) {
      body.style.overflow = 'visible';
      body.style.maxHeight = 'none';
    }
  });

  hdr.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      body.style.overflow = 'hidden';
      body.style.maxHeight = body.scrollHeight + 'px';
      requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      acc.classList.remove('open');
      hdr.setAttribute('aria-expanded', 'false');
    } else {
      body.style.overflow = 'hidden';
      acc.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 'px';
      hdr.setAttribute('aria-expanded', 'true');
    }
  });

  return acc;
}

function fmtDuration(secs) {
  if (secs == null) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function buildSeoBody(entity, data, sty) {
  const ga4 = data.ga4 || {};
  const org  = ga4.organic;
  const daily = data.daily_organic || [];
  const wm = data.wow_mom || {};
  const lp = data.landing_pages || [];
  const nvr = data.new_vs_returning || {};
  const gsc = data.organic_search;
  let html = '';

  // ── Organic Sessions with trend + WoW ──
  html += `<div class="seo-section-label" style="color:${sty.accent}">Organic Sessions</div>`;
  if (!org || org.sessions === 0) {
    html += `<p class="empty-state">No organic search sessions this period.</p>`;
  } else {
    // Summary metrics row
    html += `<div class="metrics-grid">`;
    html += metricCard('Sessions', fmt.int(org.sessions), 'Organic Search').outerHTML;
    html += metricCard('Users', fmt.int(org.users), null).outerHTML;
    html += metricCard('Engaged', fmt.int(org.engaged_sessions), null).outerHTML;
    html += `</div>`;

    // WoW change
    if (wm.wow_change != null) {
      const pct = (wm.wow_change * 100).toFixed(1);
      const cls = wm.wow_change >= 0 ? 'up' : 'down';
      const arrow = wm.wow_change >= 0 ? '\u25B2' : '\u25BC';
      html += `<div class="seo-change-row">
        <div class="seo-change-item">
          <span class="change-val ${cls}">${arrow} ${Math.abs(pct)}%</span>
          <span class="change-label">vs previous ${wm.period_days}-day period (${fmt.int(wm.prev_total)} sessions)</span>
        </div>
      </div>`;
    }

    // Sparkline trend
    if (daily.length > 1) {
      html += `<canvas class="seo-trend-canvas" data-daily='${JSON.stringify(daily)}' data-color="${sty.accent}"></canvas>`;
    }
  }

  // ── Organic Conversions ──
  if (org && org.conversions > 0) {
    html += `<div class="seo-section-label">Organic Conversions</div>`;
    html += `<div class="seo-conv-row">
      <div class="seo-conv-item">
        <strong>${fmt.int(org.conversions)}</strong>
        <span>Conversions</span>
      </div>
      <div class="seo-conv-item">
        <strong>${fmt.pct(org.conversion_rate)}</strong>
        <span>Conversion Rate</span>
      </div>
    </div>`;
  }

  // ── Engagement Rate ──
  if (org && org.engagement_rate != null) {
    html += `<div class="seo-section-label">Organic Engagement</div>`;
    html += `<div class="metrics-grid">`;
    html += metricCard('Engagement Rate', fmt.pct(org.engagement_rate), null).outerHTML;
    html += metricCard('Bounce Rate', fmt.pct(org.bounce_rate), null).outerHTML;
    html += metricCard('Avg. Session', fmtDuration(org.avg_session_duration), null).outerHTML;
    html += `</div>`;
  }

  // ── Google Search Impressions + Avg Position ──
  html += `<div class="seo-section-label">Google Search Performance</div>`;
  if (gsc) {
    html += `<div class="seo-gsc-grid">`;
    html += metricCard('Clicks', fmt.int(gsc.clicks), null).outerHTML;
    html += metricCard('Impressions', fmt.int(gsc.impressions), null).outerHTML;
    html += metricCard('Avg. Position', gsc.avg_position != null ? gsc.avg_position.toFixed(1) : '—', null).outerHTML;
    html += `</div>`;
  } else {
    html += `<p class="empty-state">Pending GSC Connection</p>`;
  }

  // ── Top Search Queries (by Clicks) ──
  const topQueries = (data.top_queries || []).slice().sort((a, b) =>
    b.clicks - a.clicks || b.impressions - a.impressions || a.position - b.position
  );
  html += `<div class="seo-section-label">Top Search Queries by Clicks</div>`;
  if (topQueries.length) {
    html += `<table class="seo-lp-table seo-query-table"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(0, 10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No search query data this period.</p>`;
  }

  // ── Top 10 Organic Landing Pages ──
  html += `<div class="seo-section-label">Top Organic Landing Pages</div>`;
  if (lp.length) {
    html += `<table class="seo-lp-table"><thead><tr><th>Page</th><th>Sessions</th></tr></thead><tbody>`;
    for (const p of lp) {
      const style = p.is_other ? ' style="color:#888;font-style:italic;border-top:1px solid #e0e0e0"' : '';
      html += `<tr><td${style}>${p.page}</td><td${style}>${fmt.int(p.sessions)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No organic landing page data this period.</p>`;
  }

  // ── New vs Returning Users ──
  html += `<div class="seo-section-label">New vs Returning (Organic)</div>`;
  if (nvr.new_sessions || nvr.returning_sessions) {
    const newPct = nvr.new_pct != null ? (nvr.new_pct * 100).toFixed(0) : 0;
    const retPct = nvr.returning_pct != null ? (nvr.returning_pct * 100).toFixed(0) : 0;
    html += `<div class="seo-nvr-bar">
      <div class="new" style="width:${newPct}%">${newPct}%</div>
      <div class="ret" style="width:${retPct}%">${retPct}%</div>
    </div>`;
    html += `<div class="seo-nvr-legend">
      <div>New: <span>${fmt.int(nvr.new_sessions)}</span> sessions · <span>${fmt.int(nvr.new_users)}</span> users</div>
      <div>Returning: <span>${fmt.int(nvr.returning_sessions)}</span> sessions · <span>${fmt.int(nvr.returning_users)}</span> users</div>
    </div>`;
  } else {
    html += `<p class="empty-state">No new vs returning data this period.</p>`;
  }

  // ── All Queries (expandable) ──
  if (topQueries.length > 10) {
    const remainId = `gsc-more-${entity}`;
    html += `<div style="text-align:center;margin:.5rem 0">
      <button class="seo-show-more-btn" onclick="document.getElementById('${remainId}').classList.toggle('hidden');this.textContent=this.textContent==='Show all queries'?'Show fewer':'Show all queries'">Show all queries</button>
    </div>`;
    html += `<table id="${remainId}" class="seo-lp-table seo-query-table hidden"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  return html;
}

function buildSeoAccordion(entity) {
